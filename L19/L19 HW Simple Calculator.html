<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
</head>
<body>
    <p id="Textual"></p>
    <p id="Numerical"></p>
    <p id="Numerical2"></p>
    <p id="Numerical3"></p>
    <p id="Numerical4"></p>
    <p id="Numerical5"></p>
    <p id="Numerical6"></p>
    <p id="Numerical7"></p>
    <p id="Numerical8"></p>
    <p id="Numerical9"></p>
    <p id="Numerical10"></p>

    <script>
         document.getElementById("Textual").innerHTML = "Reminding you that a=1,b=2,c=3,d=4,e=5,f=6";

         var a=1;
         var b=2;
         var c=3;
         var d=4;
         var e=5;
         var f=6;

         var sum = a+b
         var sum2 = b+c
         var sum3 = c+d
         var sum4 = d+e
         var sum5 = e+f
         var sum6 = a-b
         var sum7 = b-c
         var sum8 = c-d
         var sum9 = d-e
         var sum10 = e-f
         document.getElementById("Numerical").innerHTML = "The sum of a+b is: "+sum
         document.getElementById("Numerical2").innerHTML = "The sum of b+c is: "+sum2
         document.getElementById("Numerical3").innerHTML = "The sum of c+d is: "+sum3
         document.getElementById("Numerical4").innerHTML = "The sum of d+e is: "+sum4
         document.getElementById("Numerical5").innerHTML = "The sum of e+f is: "+sum5
         document.getElementById("Numerical6").innerHTML = "The sum of a-b is: "+sum6
         document.getElementById("Numerical7").innerHTML = "The sum of b-c is: "+sum7
         document.getElementById("Numerical8").innerHTML = "The sum of c-d is: "+sum8
         document.getElementById("Numerical9").innerHTML = "The sum of d-e is: "+sum9
         document.getElementById("Numerical10").innerHTML = "The sum of e-f is: "+sum10

    </script>
</body>
</html>
