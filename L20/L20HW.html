<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Scoope of Variables</title>
    </head>
    <body>
        <p>
            A function can access variables defined inside the function:
        </p>

        <button type="button" onclick="myFunction()">Click Me!</button>
        <p id="ans"></p>
        <p id="ans2"></p>

        <script>
            var b = undefined

            function myFunction() {
                var a= 7;
                document.getElementById("ans").innerHTML= a * b;
            }

            document.getElementById("ans2").innerHTML = b;
        </script>
    </body>
</html>
