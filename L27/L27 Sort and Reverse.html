<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sort and reverse</title>
</head>
<body>
    <h2>JavaScript Array Sort and Reverse</h2>
    <p>Click the button to sort the array in ascending or descending order.</p>

    <p id="result_fruit"></p>
        <button onclick="sortfunction()">Sort fruit</button>
        <button onclick="reversefunction()">Reverse fruit</button>

        <br><br>

        <hr>

        <p id="result_number"></p>
        <button onclick="ascending()">Ascending order</button>
        <button onclick="descending()">Descending order</button>

        <script>
            //ALPHABETS
            var fruits = ["Banana", "Orange", "Apple", "Mango"];
            document.getElementById("result_fruit").innerHTML = fruits;

            function sortfunction() {
                fruits.sort();
                document.getElementById("result_fruit").innerHTML = fruits;
            }

            function reversefunction() {
                fruits.reverse();
                document.getElementById("result_fruit").innerHTML = fruits;
            }

            //NUMBERS
            var points = [30, 200, 700, 10, 90];
            document.getElementById("result_number").innerHTML = points;

            function ascending() {
                points.sort(function(a, b){return a - b});
                document.getElementById("result_number").innerHTML = points;
            }

            function descending() {
                points.sort(function(a, b){return b - a});
                document.getElementById("result_number").innerHTML = points;
            }    
        </script>
</body>
</html>
